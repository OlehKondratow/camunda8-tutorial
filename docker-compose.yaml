# Lokalny Zeebe + workery Go i Python (job types: c8jw-golang, c8jw-python).
# Uruchomienie z katalogu głównego repozytorium camunda8-tutorial:
#   docker compose up --build
#   podman-compose -f docker-compose.yaml up --build
#
# BPMN: zeebe-tutorial/bpmn/examples/example-task.bpmn (process id: example-task-process).
# Dla zdalnej bramy (GKE port-forward na host): zatrzymaj serwis zeebe i ustaw
# ZEEBE_ADDRESS=host.docker.internal:26500 u workerów (Linux bez Docker Desktop — IP hosta).

services:
  zeebe:
    image: camunda/zeebe:8.5.13
    ports:
      - "26500:26500"
      - "26501:26501"
      - "26502:26502"
      - "9600:9600"
    environment:
      ZEEBE_BROKER_GATEWAY_NETWORK_HOST: 0.0.0.0
    restart: unless-stopped

  example-worker-go:
    build:
      context: ./zeebe-tutorial
      dockerfile: Dockerfile
    environment:
      ZEEBE_ADDRESS: zeebe:26500
      ZEEBE_LOCAL_PLAINTEXT: "true"
    depends_on:
      - zeebe
    restart: unless-stopped

  example-worker-python:
    build:
      context: ./zeebe-tutorial/python/example-zeebe-worker
      dockerfile: Dockerfile
    environment:
      ZEEBE_ADDRESS: zeebe:26500
    depends_on:
      - zeebe
    restart: unless-stopped
