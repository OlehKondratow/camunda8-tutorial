# Python (echo) — job type c8jw-python-echo. Obraz / StatefulSet / app: c8jw-python-echo
apiVersion: v1
kind: Service
metadata:
  name: c8jw-python-echo-headless
  namespace: c8-tutorial-workers
  labels:
    app: c8jw-python-echo
spec:
  clusterIP: None
  selector:
    app: c8jw-python-echo
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: c8jw-python-echo
  namespace: c8-tutorial-workers
  labels:
    app: c8jw-python-echo
    app.kubernetes.io/component: python
spec:
  serviceName: c8jw-python-echo-headless
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: c8jw-python-echo
  template:
    metadata:
      labels:
        app: c8jw-python-echo
        app.kubernetes.io/component: python
    spec:
      containers:
        - name: worker
          image: europe-west3-docker.pkg.dev/my-camunda8-project/c8-tutorial-docker/c8jw-python-echo:latest
          imagePullPolicy: Always
          env:
            - name: ZEEBE_ADDRESS
              value: camunda-platform-zeebe-gateway.camunda.svc.cluster.local:26500
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
